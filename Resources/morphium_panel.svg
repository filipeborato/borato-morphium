<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eee8d8"/>
      <stop offset="1" stop-color="#bdb5a6"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#49443d" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="knob" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#585d5f"/>
      <stop offset="0.45" stop-color="#2d3032"/>
      <stop offset="1" stop-color="#101112"/>
    </linearGradient>
    <linearGradient id="slot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#202427"/>
      <stop offset="1" stop-color="#070808"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#371015"/>
      <stop offset="1" stop-color="#080203"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .brand { font: 800 44px 'Arial Black', Arial, sans-serif; letter-spacing: 8px; fill: #211d18; }
      .brandHi { font: 800 44px 'Arial Black', Arial, sans-serif; letter-spacing: 8px; fill: #fff7e6; }
      .sub { font: 700 13px Arial, sans-serif; letter-spacing: 5px; fill: #6b5f4c; }
      .tag { font: 800 11px Arial, sans-serif; letter-spacing: 3px; fill: #8d6d2d; }
      .section { font: 700 15px Arial, sans-serif; letter-spacing: 2px; fill: #2e2923; }
      .small { font: 700 10px Arial, sans-serif; letter-spacing: 1.1px; fill: #4c4439; }
      .gold { font: 700 10px Arial, sans-serif; letter-spacing: 1.2px; fill: #8d6d2d; }
      .led { font-family: 'Courier New', monospace; fill: #ff3131; filter: url(#glow); }
      .line { stroke: #6d6559; stroke-width: 1; opacity: 0.55; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#1f1f1d"/>

  <!-- Chassis -->
  <g filter="url(#shadow)">
    <rect x="22" y="22" width="1236" height="716" rx="28" fill="url(#rim)"/>
    <rect x="40" y="40" width="1200" height="680" rx="20" fill="url(#panel)"/>
    <rect x="58" y="58" width="1164" height="644" rx="12" fill="none" stroke="#fff4dd" stroke-opacity="0.45" stroke-width="2"/>
    <rect x="64" y="64" width="1152" height="632" rx="10" fill="none" stroke="#302c27" stroke-opacity="0.25" stroke-width="2"/>
  </g>

  <!-- Screws -->
  <g fill="#b8ae9d" stroke="#36312c" stroke-width="2">
    <circle cx="74" cy="74" r="11"/><circle cx="1206" cy="74" r="11"/>
    <circle cx="74" cy="686" r="11"/><circle cx="1206" cy="686" r="11"/>
  </g>
  <g stroke="#27231f" stroke-width="2" stroke-linecap="round">
    <line x1="68" y1="72" x2="80" y2="76"/><line x1="1200" y1="79" x2="1212" y2="69"/>
    <line x1="68" y1="688" x2="80" y2="684"/><line x1="1200" y1="682" x2="1212" y2="690"/>
  </g>

  <!-- Header: engraved wordmark + gold accent -->
  <text class="brandHi" x="135" y="124">BORATO MORPHIUM</text>
  <text class="brand"   x="135" y="122">BORATO MORPHIUM</text>
  <rect x="138" y="138" width="72" height="5" rx="2.5" fill="#8d6d2d"/>
  <text class="sub" x="216" y="143">SOUND MATTER SYNTHESIZER</text>
  <text class="tag" x="138" y="170">M-01 · MORPH SERIES</text>
  <text class="gold" text-anchor="end" x="1145" y="142">CORE → MATTER → MORPH → SPACE</text>
  <text class="small" text-anchor="end" x="1145" y="164">VST3 / JUCE / BUILD 0.1</text>

  <!-- Top Display Row -->
  <g transform="translate(135 215)">
    <rect x="0" y="0" width="420" height="105" rx="10" fill="#3b352f" opacity="0.85"/>
    <rect x="12" y="12" width="396" height="81" rx="6" fill="url(#glass)" stroke="#090303" stroke-width="4"/>
  </g>

  <g transform="translate(595 215)">
    <rect x="0" y="0" width="250" height="105" rx="10" fill="#3b352f" opacity="0.85"/>
    <rect x="13" y="13" width="224" height="79" rx="6" fill="#101715" stroke="#263b36" stroke-width="4"/>
    <g stroke="#3f6e61" stroke-width="1" opacity="0.5">
      <line x1="25" y1="38" x2="225" y2="38"/><line x1="25" y1="65" x2="225" y2="65"/>
      <line x1="65" y1="23" x2="65" y2="84"/><line x1="105" y1="23" x2="105" y2="84"/><line x1="145" y1="23" x2="145" y2="84"/><line x1="185" y1="23" x2="185" y2="84"/>
    </g>
  </g>

  <!-- Source buttons -->
  <g transform="translate(885 215)">
    <text class="section" x="0" y="-16">SOURCE</text>
    <g>
      <rect x="0" y="0" width="78" height="36" rx="6" fill="#202326" stroke="#5f584d" stroke-width="2"/>
      <rect x="88" y="0" width="78" height="36" rx="6" fill="#202326" stroke="#5f584d" stroke-width="2"/>
      <rect x="176" y="0" width="78" height="36" rx="6" fill="#202326" stroke="#5f584d" stroke-width="2"/>
      <text class="small" x="22" y="23" fill="#ddd4bd">BOW</text><text class="small" x="105" y="23" fill="#ddd4bd">STRIKE</text><text class="small" x="199" y="23" fill="#ddd4bd">TAPE</text>
    </g>
    <g transform="translate(0 48)">
      <rect x="0" y="0" width="78" height="36" rx="6" fill="#202326" stroke="#5f584d" stroke-width="2"/>
      <rect x="88" y="0" width="78" height="36" rx="6" fill="#202326" stroke="#5f584d" stroke-width="2"/>
      <rect x="176" y="0" width="78" height="36" rx="6" fill="#202326" stroke="#5f584d" stroke-width="2"/>
      <text class="small" x="17" y="23" fill="#ddd4bd">VOICE</text><text class="small" x="106" y="23" fill="#ddd4bd">NOISE</text><text class="small" x="196" y="23" fill="#ddd4bd">SPARK</text>
    </g>
  </g>

  <line class="line" x1="135" y1="355" x2="1145" y2="355"/>

  <!-- Lower grid panels -->
  <g transform="translate(135 395)">
    <text class="section" x="0" y="0">CORE</text>
    <text class="gold" x="0" y="20">EXCITATION</text>
    <g transform="translate(45 95)">
      <g>
        <circle r="43" fill="#81796c" opacity="0.45"/><circle r="34" fill="url(#knob)" stroke="#0a0a0a" stroke-width="3"/><line x1="0" y1="0" x2="0" y2="-25" stroke="#f4efe1" stroke-width="4" stroke-linecap="round"/><text class="small" x="-23" y="58">ATTACK</text>
      </g>
      <g transform="translate(100 0)">
        <circle r="43" fill="#81796c" opacity="0.45"/><circle r="34" fill="url(#knob)" stroke="#0a0a0a" stroke-width="3"/><line x1="0" y1="0" x2="18" y2="-18" stroke="#f4efe1" stroke-width="4" stroke-linecap="round"/><text class="small" x="-25" y="58">DECAY</text>
      </g>
      <g transform="translate(200 0)">
        <circle r="43" fill="#81796c" opacity="0.45"/><circle r="34" fill="url(#knob)" stroke="#0a0a0a" stroke-width="3"/><line x1="0" y1="0" x2="-18" y2="-18" stroke="#f4efe1" stroke-width="4" stroke-linecap="round"/><text class="small" x="-24" y="58">SUSTAIN</text>
      </g>
    </g>
  </g>

  <g transform="translate(445 395)">
    <text class="section" x="0" y="0">MATTER</text>
    <text class="gold" x="0" y="20">MASS · FRICTION · WEAR</text>
    <g transform="translate(20 55)">
      <g>
        <rect width="44" height="150" rx="7" fill="url(#slot)"/><line x1="22" y1="18" x2="22" y2="132" stroke="#6e6559" stroke-width="3"/><text class="small" x="-6" y="175">DENS</text>
      </g>
      <g transform="translate(64 0)">
        <rect width="44" height="150" rx="7" fill="url(#slot)"/><line x1="22" y1="18" x2="22" y2="132" stroke="#6e6559" stroke-width="3"/><text class="small" x="2" y="175">MASS</text>
      </g>
      <g transform="translate(128 0)">
        <rect width="44" height="150" rx="7" fill="url(#slot)"/><line x1="22" y1="18" x2="22" y2="132" stroke="#6e6559" stroke-width="3"/><text class="small" x="-5" y="175">FRICT</text>
      </g>
      <g transform="translate(192 0)">
        <rect width="44" height="150" rx="7" fill="url(#slot)"/><line x1="22" y1="18" x2="22" y2="132" stroke="#6e6559" stroke-width="3"/><text class="small" x="4" y="175">WEAR</text>
      </g>
    </g>
  </g>

  <g transform="translate(725 395)">
    <text class="section" x="0" y="0">BORATO MACRO</text>
    <text class="gold" x="0" y="20">MORPH ENGINE</text>
  </g>

  <g transform="translate(970 395)">
    <text class="section" x="0" y="0">MOTION / SPACE</text>
    <text class="gold" x="0" y="20">RELEASE · OUTPUT</text>
    <g transform="translate(35 92)">
      <g>
        <circle r="38" fill="#81796c" opacity="0.45"/><circle r="30" fill="url(#knob)" stroke="#0a0a0a" stroke-width="3"/><line x1="0" y1="0" x2="-12" y2="-20" stroke="#f4efe1" stroke-width="4" stroke-linecap="round"/><text class="small" x="-23" y="54">RELEASE</text>
      </g>
      <g transform="translate(95 0)">
        <circle r="38" fill="#81796c" opacity="0.45"/><circle r="30" fill="url(#knob)" stroke="#0a0a0a" stroke-width="3"/><line x1="0" y1="0" x2="16" y2="-17" stroke="#f4efe1" stroke-width="4" stroke-linecap="round"/><text class="small" x="-25" y="54">OUTPUT</text>
      </g>
    </g>
  </g>

  <text class="small" x="135" y="685">BORATO COMPANY · CURITIBA · SOUND MATTER ENGINE</text>
  <text class="small" text-anchor="end" x="1145" y="685">CORE → MATTER → OUTPUT</text>
</svg>
